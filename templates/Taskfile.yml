version: "3"

vars:
  PREPULL_IMAGES: postgres:18-alpine
  DEV_DATABASE_URL: postgresql://postgres:postgres@dind:5432/rikudxdb
  TERMINAL_RESET: "printf '\\033[?1000l\\033[?1002l\\033[?1003l\\033[?1006l\\033[?1015l\\033[?1004l\\033[?2004l\\033[0m' >/dev/tty 2>/dev/null || true; stty sane 2>/dev/null || true"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Start the Claude and DinD containers
    cmds:
      - |
        docker compose up -d
        host_manifest_sha="$(sha256sum .claude-docker.json | awk '{print $1}')"
        image_manifest_sha="$(docker compose exec -T claude bash -lc "sha256sum /usr/local/share/claude-docker/manifest.json 2>/dev/null | awk '{print \$1}'" 2>/dev/null || true)"
        if ! docker compose exec -T claude bash -lc 'command -v setup-claude-dotfiles' >/dev/null 2>&1 || [ "$host_manifest_sha" != "$image_manifest_sha" ]; then
          echo "claude image is stale; rebuilding..."
          docker compose up -d --build --force-recreate claude
        fi
      - docker compose exec -u root claude chown -R user:user /home/user/.claude /home/user/.claude-state /home/user/.config/gh /workspace/node_modules /workspace/.venv /workspace/.pnpm-store /workspace/.turbo /workspace/.ruff_cache /home/user/go /home/user/.cache/go-build /home/user/.cache/ms-playwright /workspace/apps/frontend/node_modules /workspace/apps/frontend/.next /workspace/apps/backend/.venv /workspace/apps/backend/.turbo /workspace/apps/backend/.pytest_cache /workspace/apps/backend/.ruff_cache /workspace/apps/frontend/.ruff_cache
      # 転送された ssh-agent ソケットは root:root 0660 で来るため、非rootの user が
      # 接続できず git の publickey 認証が失敗する。user 所有に直して接続可能にする。
      # (ソケットが無い = agent 転送なしの場合は何もしない)
      - docker compose exec -u root claude bash -lc 'test -S /ssh-agent && chown user:user /ssh-agent || true'
      - docker compose exec -T claude setup-claude-dotfiles

  prepull:
    desc: Pre-pull common project images into this environment's DinD cache
    deps: [up]
    cmds:
      - |
        docker compose exec claude bash -lc '
          set -euo pipefail
          for i in {1..30}; do
            docker info >/dev/null 2>&1 && break
            sleep 1
          done
          for image in {{.PREPULL_IMAGES}}; do
            docker image inspect "$image" >/dev/null 2>&1 || docker pull "$image"
          done
        '

  rebuild:
    desc: Rebuild Claude Code with the latest native installer
    cmds:
      - docker compose build --pull --no-cache claude
      - docker compose up -d --force-recreate claude

  dotfiles:
    desc: Re-link Claude Code settings from dotfiles
    cmds:
      - docker compose exec claude setup-claude-dotfiles

  down:
    desc: Stop and remove the containers
    cmds:
      - "{{.TERMINAL_RESET}}"
      - docker compose down

  ps:
    desc: Show container status
    cmds:
      - docker compose ps

  versions:
    desc: Show tool versions
    deps: [up]
    cmds:
      - docker compose exec claude bash -lc 'claude --version && uv --version && pnpm --version && biome --version && node --version'

  doctor:
    desc: Show claude-docker identity and auth status
    deps: [up]
    cmds:
      - |
        printf "host_manifest_sha256: "
        sha256sum .claude-docker.json | awk '{print $1}'
      - docker compose exec claude claude-docker-info

  logs:
    desc: Follow container logs
    cmds:
      - docker compose logs -f

  shell:
    desc: Open a shell in the Claude container
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude bash

  dev:
    desc: Run pnpm dev inside the Claude container
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude bash -lc 'cd /workspace && DATABASE_URL="{{.DEV_DATABASE_URL}}" POSTGRES_HOST=dind pnpm dev'

  claude:
    desc: Start Claude Code (新規 or 既存セッション復元)。Ctrl+C で抜けてもメニューが残る
    deps: [up]
    interactive: true
    cmds:
      - task doctor
      - |
        {{.TERMINAL_RESET}}
        docker compose exec claude bash -lc '
          cleanup() {
            printf "\033[?1000l\033[?1002l\033[?1003l\033[?1006l\033[?1015l\033[?1004l\033[?2004l\033[0m" >/dev/tty 2>/dev/null || true
            stty sane 2>/dev/null || true
          }
          # SIGINT/SIGTERM はメニューに戻すだけ。bash 自体は落とさない。
          trap cleanup EXIT HUP
          trap "cleanup" INT TERM
          cleanup

          run_claude() {
            claude ${CLAUDE_ENV_NAME:+--name "$CLAUDE_ENV_NAME"} --model "claude-opus-4-7[1m]" "$@" || true
            cleanup
          }

          # /workspace 配下のセッション(jsonl)を数える。claude は cwd を
          # "/" → "-" に置換したディレクトリ名で保存する(例: /workspace → -workspace)。
          proj_key="$(pwd | sed "s|/|-|g")"
          proj_dir="$HOME/.claude/projects/$proj_key"
          count=0
          if [ -d "$proj_dir" ]; then
            count=$(find "$proj_dir" -maxdepth 1 -type f -name "*.jsonl" 2>/dev/null | wc -l | tr -d " ")
          fi

          # セッション0件: 旧挙動(即 claude、終了で host shell に戻る)
          if [ "$count" -eq 0 ]; then
            run_claude
            exit 0
          fi

          # セッション1件以上: メニューを出して、claude 終了後もメニューに戻る
          while :; do
            count=0
            if [ -d "$proj_dir" ]; then
              count=$(find "$proj_dir" -maxdepth 1 -type f -name "*.jsonl" 2>/dev/null | wc -l | tr -d " ")
            fi

            printf "\n"
            printf "===== Claude Code (workspace: %s) =====\n" "$(pwd)"
            printf "  saved sessions: %s\n" "$count"
            printf "  [n] new session\n"
            printf "  [r] resume (picker)\n"
            printf "  [c] continue most recent\n"
            printf "  [s] shell (container bash)\n"
            printf "  [q] quit\n"
            printf "choice: "

            if ! read -r choice; then
              # EOF (Ctrl+D) → quit
              printf "\n"
              break
            fi

            case "$choice" in
              n|N|"")  run_claude ;;
              r|R)     run_claude --resume ;;
              c|C)     run_claude --continue ;;
              s|S)     bash -l || true; cleanup ;;
              q|Q)     break ;;
              *)       printf "unknown choice: %s\n" "$choice" ;;
            esac
          done
        '
        status=$?
        {{.TERMINAL_RESET}}
        exit $status

  claude-opus-4-7:
    desc: Start Claude Code with Claude Opus 4.7 1M
    deps: [up]
    interactive: true
    cmds:
      - task doctor
      - |
        {{.TERMINAL_RESET}}
        docker compose exec claude bash -lc '
          cleanup() {
            printf "\033[?1000l\033[?1002l\033[?1003l\033[?1006l\033[?1015l\033[?1004l\033[?2004l\033[0m" >/dev/tty 2>/dev/null || true
            stty sane 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM HUP
          cleanup
          claude ${CLAUDE_ENV_NAME:+--name "$CLAUDE_ENV_NAME"} --model "claude-opus-4-7[1m]"
        '
        status=$?
        {{.TERMINAL_RESET}}
        exit $status

  tmux:
    desc: Attach to the persistent Claude tmux session
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude tmux new -A -s claude

  reset-terminal:
    desc: Reset terminal modes after a crashed TUI
    interactive: true
    cmds:
      - "{{.TERMINAL_RESET}}"

  gh-login:
    desc: Log in to GitHub CLI
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude gh auth login

  # gpu-tunnel 系は「起動済みコンテナにトンネルを足す」操作なので up/build はしない。
  # 未起動なら precondition で案内して止める(先に task up / task claude が必要)。
  gpu-tunnel:
    desc: Start the GPU (riku-dx-spare-gpu) port-forward 127.0.0.1:8012 (container must be up)
    preconditions:
      - sh: docker compose ps --services --status running | grep -q '^claude$'
        msg: "claude コンテナが起動していません。先に `task up`(または `task claude`)で立ち上げてください。"
    cmds:
      # 鍵は転送 agent を使う。事前にホストで該当鍵を ssh-add しておくこと。
      # 起動判定はプロセス名 grep だと「pattern を含む自分のシェル」に self-match して
      # 誤判定するため、実際にポート 8012 が開通したかで判定する(これが本来の成功条件)。
      # -d で投げっぱなしにせず成否を正直に返す(失敗時に started と誤表示しない)。
      - |
        docker compose exec -T claude bash -lc '
          if (echo > /dev/tcp/127.0.0.1/8012) 2>/dev/null; then
            echo "GPU tunnel already up (127.0.0.1:8012)"; exit 0
          fi
          autossh -f -N -M 0 -o "ServerAliveInterval 30" -o "ServerAliveCountMax 3" -o "ExitOnForwardFailure yes" -L 127.0.0.1:8012:localhost:8012 riku-dx-spare-gpu-user
          for i in 1 2 3 4 5; do
            (echo > /dev/tcp/127.0.0.1/8012) 2>/dev/null && { echo "GPU tunnel up: container 127.0.0.1:8012 -> riku-dx-spare-gpu:8012"; exit 0; }
            sleep 1
          done
          echo "ERROR: トンネルを張れませんでした。ホストで GPU 鍵を ssh-add したか確認してください:" >&2
          echo "  ssh-add ~/ssh_keys/gg/riku-dx-spare-gpu/av_araidaisuke/riku-dx-spare-gpu_av_araidaisuke_ed25519" >&2
          exit 1
        '

  gpu-tunnel-stop:
    desc: Stop the GPU port-forward inside the container
    preconditions:
      - sh: docker compose ps --services --status running | grep -q '^claude$'
        msg: "claude コンテナが起動していません(トンネルも存在しません)。先に `task up` で立ち上げてください。"
    cmds:
      # pattern を含む自分の pkill シェルを巻き込まないよう [.] で self-match を回避し、
      # 転送スペック(autossh と ssh の両方が持つ)で止める。
      - docker compose exec claude bash -lc 'pkill -f "127[.]0[.]0[.]1:8012:localhost:8012" && echo stopped || echo "no tunnel running"'

  gpu-tunnel-status:
    desc: Show the GPU port-forward status inside the container
    preconditions:
      - sh: docker compose ps --services --status running | grep -q '^claude$'
        msg: "claude コンテナが起動していません。先に `task up`(または `task claude`)で立ち上げてください。"
    cmds:
      - docker compose exec claude bash -lc 'pgrep -af "127[.]0[.]0[.]1:8012:localhost:8012" || echo "no tunnel running"'
