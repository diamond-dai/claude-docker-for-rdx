version: "3"

vars:
  PREPULL_IMAGES: postgres:18-alpine
  DEV_DATABASE_URL: postgresql://postgres:postgres@dind:5432/rikudxdb
  TERMINAL_RESET: "printf '\\033[?1000l\\033[?1002l\\033[?1003l\\033[?1006l\\033[?1015l\\033[?1004l\\033[?2004l\\033[0m' >/dev/tty 2>/dev/null || true; stty sane 2>/dev/null || true"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Start the Claude and DinD containers
    cmds:
      - |
        docker compose up -d
        host_manifest_sha="$(sha256sum .claude-docker.json | awk '{print $1}')"
        image_manifest_sha="$(docker compose exec -T claude bash -lc "sha256sum /usr/local/share/claude-docker/manifest.json 2>/dev/null | awk '{print \$1}'" 2>/dev/null || true)"
        if ! docker compose exec -T claude bash -lc 'command -v setup-claude-dotfiles' >/dev/null 2>&1 || [ "$host_manifest_sha" != "$image_manifest_sha" ]; then
          echo "claude image is stale; rebuilding..."
          docker compose up -d --build --force-recreate claude
        fi
      - docker compose exec -u root claude chown -R user:user /home/user/.claude /home/user/.claude-state /home/user/.config/gh /workspace/node_modules /workspace/.venv /workspace/.pnpm-store /workspace/.turbo /workspace/.ruff_cache /home/user/go /home/user/.cache/go-build /workspace/apps/frontend/node_modules /workspace/apps/frontend/.next /workspace/apps/backend/.venv /workspace/apps/backend/.turbo /workspace/apps/backend/.pytest_cache /workspace/apps/backend/.ruff_cache /workspace/apps/frontend/.ruff_cache
      # 転送された ssh-agent ソケットは root:root 0660 で来るため、非rootの user が
      # 接続できず git の publickey 認証が失敗する。user 所有に直して接続可能にする。
      # (ソケットが無い = agent 転送なしの場合は何もしない)
      - docker compose exec -u root claude bash -lc 'test -S /ssh-agent && chown user:user /ssh-agent || true'
      - docker compose exec -T claude setup-claude-dotfiles

  prepull:
    desc: Pre-pull common project images into this environment's DinD cache
    deps: [up]
    cmds:
      - |
        docker compose exec claude bash -lc '
          set -euo pipefail
          for i in {1..30}; do
            docker info >/dev/null 2>&1 && break
            sleep 1
          done
          for image in {{.PREPULL_IMAGES}}; do
            docker image inspect "$image" >/dev/null 2>&1 || docker pull "$image"
          done
        '

  rebuild:
    desc: Rebuild Claude Code with the latest native installer
    cmds:
      - docker compose build --pull --no-cache claude
      - docker compose up -d --force-recreate claude

  dotfiles:
    desc: Re-link Claude Code settings from dotfiles
    cmds:
      - docker compose exec claude setup-claude-dotfiles

  down:
    desc: Stop and remove the containers
    cmds:
      - "{{.TERMINAL_RESET}}"
      - docker compose down

  ps:
    desc: Show container status
    cmds:
      - docker compose ps

  versions:
    desc: Show tool versions
    deps: [up]
    cmds:
      - docker compose exec claude bash -lc 'claude --version && uv --version && pnpm --version && biome --version && node --version'

  doctor:
    desc: Show claude-docker identity and auth status
    deps: [up]
    cmds:
      - |
        printf "host_manifest_sha256: "
        sha256sum .claude-docker.json | awk '{print $1}'
      - docker compose exec claude claude-docker-info

  logs:
    desc: Follow container logs
    cmds:
      - docker compose logs -f

  shell:
    desc: Open a shell in the Claude container
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude bash

  dev:
    desc: Run pnpm dev inside the Claude container
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude bash -lc 'cd /workspace && DATABASE_URL="{{.DEV_DATABASE_URL}}" POSTGRES_HOST=dind pnpm dev'

  claude:
    desc: Start Claude Code with Claude Opus 4.7 1M in the project workspace
    deps: [up]
    interactive: true
    cmds:
      - task doctor
      - |
        {{.TERMINAL_RESET}}
        docker compose exec claude bash -lc '
          cleanup() {
            printf "\033[?1000l\033[?1002l\033[?1003l\033[?1006l\033[?1015l\033[?1004l\033[?2004l\033[0m" >/dev/tty 2>/dev/null || true
            stty sane 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM HUP
          cleanup
          claude --model "claude-opus-4-7[1m]"
        '
        status=$?
        {{.TERMINAL_RESET}}
        exit $status

  claude-opus-4-7:
    desc: Start Claude Code with Claude Opus 4.7 1M
    deps: [up]
    interactive: true
    cmds:
      - task doctor
      - |
        {{.TERMINAL_RESET}}
        docker compose exec claude bash -lc '
          cleanup() {
            printf "\033[?1000l\033[?1002l\033[?1003l\033[?1006l\033[?1015l\033[?1004l\033[?2004l\033[0m" >/dev/tty 2>/dev/null || true
            stty sane 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM HUP
          cleanup
          claude --model "claude-opus-4-7[1m]"
        '
        status=$?
        {{.TERMINAL_RESET}}
        exit $status

  tmux:
    desc: Attach to the persistent Claude tmux session
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude tmux new -A -s claude

  reset-terminal:
    desc: Reset terminal modes after a crashed TUI
    interactive: true
    cmds:
      - "{{.TERMINAL_RESET}}"

  gh-login:
    desc: Log in to GitHub CLI
    deps: [up]
    interactive: true
    cmds:
      - docker compose exec claude gh auth login

  gpu-tunnel:
    desc: Start the GPU (riku-dx-spare-gpu) port-forward 127.0.0.1:8012 inside the container
    deps: [up]
    cmds:
      # 鍵は転送 agent を使う。事前にホストで該当鍵を ssh-add しておくこと。
      # autossh -f が自前で background 化するので exec はすぐ戻る。
      - docker compose exec -d claude autossh -f -N -M 0 -o "ServerAliveInterval 30" -o "ServerAliveCountMax 3" -o "ExitOnForwardFailure yes" -L 127.0.0.1:8012:localhost:8012 riku-dx-spare-gpu-user
      - 'echo "GPU tunnel started: container 127.0.0.1:8012 -> riku-dx-spare-gpu:8012"'

  gpu-tunnel-stop:
    desc: Stop the GPU port-forward inside the container
    cmds:
      - docker compose exec claude bash -lc 'pkill -f "riku-dx-spare-gpu-user" && echo stopped || echo "no tunnel running"'

  gpu-tunnel-status:
    desc: Show the GPU port-forward status inside the container
    deps: [up]
    cmds:
      - docker compose exec claude bash -lc 'pgrep -af "riku-dx-spare-gpu-user" || echo "no tunnel running"'
